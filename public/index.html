<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tumblerify — Tumbler Wrap Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-icon">T</span>
      <span class="logo-text">Tumblerify</span>
    </div>
    <div class="tagline">AI-powered tumbler wrap generator</div>
  </div>
</header>

<main class="main">

  <!-- LEFT: Controls -->
  <aside class="controls-panel">

    <!-- Step 1: Size -->
    <div class="step-card">
      <div class="step-header">
        <span class="step-num">1</span>
        <span class="step-title">Cup size</span>
      </div>
      <div class="size-grid" id="sizeGrid">
        <!-- Populated by JS -->
      </div>
    </div>

    <!-- Step 2: Upload -->
    <div class="step-card">
      <div class="step-header">
        <span class="step-num">2</span>
        <span class="step-title">Upload design</span>
      </div>
      <div class="upload-zone" id="uploadZone">
        <div class="upload-icon">↑</div>
        <div class="upload-text">Drop PNG/JPG here</div>
        <div class="upload-sub">or click to browse</div>
        <input type="file" id="fileInput" accept="image/png,image/jpeg,image/webp" hidden>
      </div>
      <div class="upload-preview" id="uploadPreview" style="display:none">
        <img id="previewThumb" alt="Design preview">
        <button class="btn-ghost btn-sm" id="clearImage">✕ Remove</button>
      </div>
    </div>

    <!-- Step 3: Options -->
    <div class="step-card">
      <div class="step-header">
        <span class="step-num">3</span>
        <span class="step-title">Options</span>
      </div>

      <label class="option-label">Overlap tab</label>
      <div class="slider-row">
        <input type="range" id="overlapSlider" min="5" max="20" value="10" step="1">
        <span class="slider-val" id="overlapVal">10 mm</span>
      </div>

      <label class="option-label" style="margin-top:12px">Preview mode</label>
      <div class="toggle-row">
        <button class="toggle-btn active" id="btnFlat" onclick="setPreviewMode('flat')">Flat wrap</button>
        <button class="toggle-btn" id="btn3d" onclick="setPreviewMode('3d')">3D cup</button>
      </div>
    </div>

    <!-- Analyze + Download -->
    <button class="btn-analyze" id="btnAnalyze" disabled>
      <span class="btn-icon">✦</span> Analyze with AI
    </button>
    <button class="btn-download" id="btnDownload" disabled>
      ↓ Download PDF + Cutfile
    </button>
  </aside>

  <!-- RIGHT: Preview -->
  <section class="preview-panel">
    <div class="preview-header">
      <span id="previewLabel">Select a size and upload your design</span>
      <span class="preview-dims" id="previewDims"></span>
    </div>

    <!-- Flat wrap canvas -->
    <div class="canvas-wrap" id="flatWrap">
      <canvas id="flatCanvas"></canvas>
      <div class="canvas-empty" id="canvasEmpty">
        <div class="empty-icon">◎</div>
        <div class="empty-text">Your wrap preview will appear here</div>
      </div>
    </div>

    <!-- 3D cup canvas -->
    <div class="canvas-wrap" id="cup3dWrap" style="display:none">
      <canvas id="cup3dCanvas"></canvas>
    </div>

    <!-- AI Analysis panel -->
    <div class="ai-panel" id="aiPanel" style="display:none">
      <div class="ai-panel-header">
        <span class="ai-label">✦ AI Design Analysis</span>
        <span class="ai-quality" id="aiQuality"></span>
      </div>
      <div class="ai-swatches" id="aiSwatches"></div>
      <div class="ai-style" id="aiStyle"></div>
      <div class="ai-mood" id="aiMood"></div>
      <div class="ai-note" id="aiNote"></div>
      <div class="ai-tip" id="aiTip"></div>
    </div>
  </section>

</main>

<script src="frustum.js"></script>
<script src="app.js"></script>
</body>
</html>
